server:
  port: 8080

spring:
  datasource:
    mysql:
      jdbc-url: jdbc:mysql://localhost:3306/smartticket?useSSL=false&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
    postgres:
      jdbc-url: jdbc:postgresql://localhost:5432/smartticket_vector
      username: postgres
      password: root
      driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

langchain4j:
  open-ai:
    chat-model:
      api-key: ${LLM_API_KEY:sk-demo}
      base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
      model-name: gpt-4o-mini
      temperature: 0.7
      max-tokens: 2048
    embedding-model:
      api-key: ${LLM_API_KEY:sk-demo}
      base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
      model-name: text-embedding-3-small
